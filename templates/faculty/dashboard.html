{% extends "base.html" %}{% block content %}
<h2 class="fw-bold mb-4">Faculty Dashboard</h2>
<div class="row g-4">
<div class="col-md-4"><div class="card border-0 shadow-sm rounded-4"><div class="card-body"><div class="text-muted">Total Submissions</div><div class="fs-2 fw-bold">{{ total_submissions }}</div></div></div></div>
<div class="col-md-4"><div class="card border-0 shadow-sm rounded-4"><div class="card-body"><div class="text-muted">Reviewed</div><div class="fs-2 fw-bold">{{ reviewed }}</div></div></div></div>
<div class="col-md-4"><div class="card border-0 shadow-sm rounded-4"><div class="card-body"><div class="text-muted">Average AI Score</div><div class="fs-2 fw-bold">{{ avg_ai_score }}</div></div></div></div>
</div>
<div class="mt-4 d-flex gap-2"><a class="btn btn-primary rounded-3" href="{{ url_for('faculty_submissions') }}">Review Submissions</a><a class="btn btn-outline-primary rounded-3" href="{{ url_for('faculty_curriculum_insights') }}">Curriculum Insights</a><a class="btn btn-outline-secondary rounded-3" href="{{ url_for('faculty_reports_csv') }}">Download Report CSV</a></div>
{% endblock %}
