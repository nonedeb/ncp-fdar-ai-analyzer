{% extends "base.html" %}{% block content %}<h2 class="fw-bold mb-4">Submit NCP / FDAR</h2><div class="card border-0 shadow-sm rounded-4"><div class="card-body"><form method="POST" enctype="multipart/form-data" class="row g-3"><div class="col-md-3"><label class="form-label">Document Type</label><select name="document_type" class="form-select rounded-3" required><option value="">Select</option><option>NCP</option><option>FDAR</option></select></div><div class="col-md-9"><label class="form-label">Title</label><input name="title" class="form-control rounded-3" required></div><div class="col-12"><label class="form-label">Upload File (PDF / image)</label><input type="file" name="file" class="form-control rounded-3" accept=".pdf,.png,.jpg,.jpeg" required></div><div class="col-12"><button class="btn btn-primary rounded-3">Upload and Analyze</button></div></form><p class="small text-muted mt-3 mb-0">PDF works out of the box. Image OCR works when Tesseract OCR is available on deployment.</p></div></div>{% endblock %}
