<div class="col-md-3"><div class="card border-0 shadow-sm rounded-4"><div class="card-body"><div class="text-muted">Users</div><div class="fs-2 fw-bold">{{ total_users }}</div></div></div></div>
<div class="col-md-3"><div class="card border-0 shadow-sm rounded-4"><div class="card-body"><div class="text-muted">Students</div><div class="fs-2 fw-bold">{{ total_students }}</div></div></div></div>

<div class="col-md-3"><div class="card border-0 shadow-sm rounded-4"><div class="card-body"><div class="text-muted">Submissions</div><div class="fs-2 fw-bold">{{ total_submissions }}</div></div></div></div>
